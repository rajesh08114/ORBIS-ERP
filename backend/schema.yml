components:
  schemas:
    AuditEntry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        actor:
          type: integer
          readOnly: true
          nullable: true
        entity_type:
          type: string
          readOnly: true
        entity_id:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        field_name:
          type: string
          readOnly: true
        old_value:
          readOnly: true
          nullable: true
        new_value:
          readOnly: true
          nullable: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
      required:
      - action
      - actor
      - entity_id
      - entity_type
      - field_name
      - id
      - ip_address
      - new_value
      - old_value
      - timestamp
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        entity_name:
          type: string
          readOnly: true
        entity_id:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        details:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - details
      - entity_id
      - entity_name
      - id
    BillOfMaterial:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 64
        finished_product:
          type: integer
        version:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BillOfMaterialLine'
          readOnly: true
      required:
      - code
      - created_at
      - finished_product
      - id
      - lines
    BillOfMaterialLine:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bom:
          type: integer
        component:
          type: integer
        quantity_required:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        operation:
          type: integer
          nullable: true
        sequence:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - bom
      - component
      - id
    Customer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer_code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 32
        address:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - customer_code
      - id
      - name
      - updated_at
    Group:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        permissions:
          type: array
          items:
            type: integer
        permissions_details:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          readOnly: true
      required:
      - id
      - name
      - permissions_details
    Login:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    ManufacturingOrder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        reference:
          type: string
          maxLength: 64
        bom:
          type: integer
          nullable: true
        finished_product:
          type: integer
          readOnly: true
          nullable: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        assignee:
          type: integer
          nullable: true
        source_sales_order:
          type: integer
          nullable: true
        trigger_reason:
          type: string
          maxLength: 255
        created_by_system:
          type: boolean
        status:
          allOf:
          - $ref: '#/components/schemas/ManufacturingOrderStatusEnum'
          readOnly: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        confirmed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ManufacturingOrderLine'
          readOnly: true
        work_orders:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrder'
          readOnly: true
      required:
      - completed_at
      - confirmed_at
      - created_at
      - finished_product
      - id
      - lines
      - reference
      - status
      - work_orders
    ManufacturingOrderLine:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order:
          type: integer
        component:
          type: integer
        quantity_required:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        quantity_reserved:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        quantity_consumed:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - component
      - id
      - order
      - quantity_consumed
      - quantity_reserved
    ManufacturingOrderStatusEnum:
      enum:
      - draft
      - confirmed
      - in_progress
      - done
      - cancelled
      type: string
      description: |-
        * `draft` - Draft
        * `confirmed` - Confirmed
        * `in_progress` - In Progress
        * `done` - Done
        * `cancelled` - Cancelled
    MovementTypeEnum:
      enum:
      - receipt
      - delivery
      - reservation
      - release
      - adjustment
      - consumption
      - production
      type: string
      description: |-
        * `receipt` - Receipt
        * `delivery` - Delivery
        * `reservation` - Reservation
        * `release` - Release
        * `adjustment` - Adjustment
        * `consumption` - Consumption
        * `production` - Production
    Operation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - name
