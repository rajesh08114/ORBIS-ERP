{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}API Sanity Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            display: ['Manrope', 'ui-sans-serif', 'system-ui'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(96,165,250,.18), 0 18px 40px rgba(2,6,23,.35)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'api_dashboard/dashboard.css' %}">
  {% block head %}{% endblock %}
</head>
<body class="min-h-full bg-slate-950 text-slate-100 antialiased">
  <div class="app-shell relative min-h-screen overflow-hidden">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(59,130,246,.18),_transparent_30%),radial-gradient(circle_at_top_right,_rgba(16,185,129,.12),_transparent_20%),linear-gradient(180deg,_rgba(2,6,23,.95),_rgba(15,23,42,1))]"></div>
    <div class="pointer-events-none absolute inset-0 opacity-70 bg-[linear-gradient(rgba(148,163,184,.06)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,.06)_1px,transparent_1px)] bg-[size:44px_44px]"></div>
    <div class="relative z-10">
      {% block content %}{% endblock %}
    </div>
  </div>
  <script src="{% static 'api_dashboard/core.js' %}"></script>
  <script src="{% static 'api_dashboard/auth.js' %}"></script>
  <script src="{% static 'api_dashboard/dashboard.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
