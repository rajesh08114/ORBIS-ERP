services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_erp
      POSTGRES_USER: mini_erp
      POSTGRES_PASSWORD: mini_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_erp -d mini_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mini_erp:mini_erp@db:5432/mini_erp
      REDIS_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

